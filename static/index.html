<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catppuccinify</title>
  <style>
    :root {
      --base: #1e1e2e;
      --mantle: #181825;
      --surface0: #313244;
      --surface1: #45475a;
      --text: #cdd6f4;
      --subtext0: #a6adc8;
      --mauve: #cba6f7;
      --red: #f38ba8;
      --green: #a6e3a1;
      --overlay0: #6c7086;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--base);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      max-width: 900px;
      width: 100%;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.4rem;
      color: var(--mauve);
      margin-bottom: 8px;
    }

    .header p {
      color: var(--subtext0);
      font-size: 1.1rem;
    }

    /* Card */
    .card {
      background-color: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: 12px;
      padding: 32px;
    }

    /* Upload Zone */
    .upload-zone {
      border: 2px dashed var(--surface1);
      border-radius: 10px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--mauve);
      background-color: rgba(203, 166, 247, 0.05);
    }

    .upload-zone-icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
      color: var(--subtext0);
    }

    .upload-zone-text {
      color: var(--subtext0);
      font-size: 1rem;
      line-height: 1.6;
    }

    .upload-zone-text span {
      color: var(--mauve);
      text-decoration: underline;
    }

    .upload-zone-hint {
      color: var(--overlay0);
      font-size: 0.85rem;
      margin-top: 8px;
    }

    #file-input {
      display: none;
    }

    /* Preview */
    .preview-section {
      display: none;
      align-items: center;
      gap: 20px;
      margin-top: 24px;
    }

    .preview-section.visible {
      display: flex;
    }

    .preview-thumb {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--surface0);
      flex-shrink: 0;
    }

    .preview-info {
      flex: 1;
      min-width: 0;
    }

    .preview-filename {
      color: var(--text);
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-size {
      color: var(--overlay0);
      font-size: 0.8rem;
      margin-top: 2px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.2s, opacity 0.2s;
      text-decoration: none;
      color: var(--base);
      flex-shrink: 0;
    }

    .btn:hover {
      filter: brightness(0.85);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: none;
    }

    .btn-mauve {
      background-color: var(--mauve);
    }

    .btn-green {
      background-color: var(--green);
    }

    /* Spinner */
    .spinner-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 32px;
    }

    .spinner-section.visible {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--surface0);
      border-top-color: var(--mauve);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner-text {
      color: var(--subtext0);
      font-size: 0.95rem;
    }

    /* Error */
    .error-message {
      display: none;
      color: var(--red);
      font-size: 0.9rem;
      margin-top: 16px;
      text-align: center;
    }

    .error-message.visible {
      display: block;
    }

    /* Result */
    .result-section {
      display: none;
      margin-top: 32px;
    }

    .result-section.visible {
      display: block;
    }

    .result-label {
      color: var(--subtext0);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .result-images {
      display: flex;
      gap: 20px;
    }

    .result-column {
      flex: 1;
      min-width: 0;
    }

    .result-column img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--surface0);
      display: block;
    }

    .result-actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 24px;
    }

    .btn-reset {
      background: none;
      border: 1px solid var(--surface1);
      color: var(--subtext0);
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      font-weight: 600;
    }

    .btn-reset:hover {
      border-color: var(--mauve);
      color: var(--text);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .card {
        padding: 20px;
      }

      .result-images {
        flex-direction: column;
      }

      .preview-section.visible {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Catppuccinify</h1>
      <p>Convert images to the Catppuccin Mocha palette</p>
    </div>

    <div class="card">
      <div class="upload-zone" id="upload-zone">
        <div class="upload-zone-icon">&#x1F5BC;</div>
        <div class="upload-zone-text">
          Drag &amp; drop an image here, or <span>click to browse</span>
        </div>
        <div class="upload-zone-hint">PNG, JPEG, or WebP &middot; Max 10 MB</div>
      </div>
      <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp">

      <div class="preview-section" id="preview-section">
        <img class="preview-thumb" id="preview-thumb" src="" alt="Preview">
        <div class="preview-info">
          <div class="preview-filename" id="preview-filename"></div>
          <div class="preview-size" id="preview-size"></div>
        </div>
        <button class="btn btn-mauve" id="convert-btn">Catppuccinify!</button>
      </div>

      <div class="spinner-section" id="spinner-section">
        <div class="spinner"></div>
        <div class="spinner-text">Converting your image&hellip;</div>
      </div>

      <div class="error-message" id="error-message"></div>

      <div class="result-section" id="result-section">
        <div class="result-images">
          <div class="result-column">
            <div class="result-label">Original</div>
            <img id="result-original" src="" alt="Original image">
          </div>
          <div class="result-column">
            <div class="result-label">Catppuccinified</div>
            <img id="result-converted" src="" alt="Converted image">
          </div>
        </div>
        <div class="result-actions">
          <a class="btn btn-green" id="download-btn" href="#" download>Download</a>
          <button class="btn-reset" id="reset-btn">Upload another image</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const MAX_FILE_SIZE = 10 * 1024 * 1024;
    const ALLOWED_TYPES = ['image/png', 'image/jpeg', 'image/webp'];
    const POLL_INTERVAL = 2000;

    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');
    const previewSection = document.getElementById('preview-section');
    const previewThumb = document.getElementById('preview-thumb');
    const previewFilename = document.getElementById('preview-filename');
    const previewSize = document.getElementById('preview-size');
    const convertBtn = document.getElementById('convert-btn');
    const spinnerSection = document.getElementById('spinner-section');
    const errorMessage = document.getElementById('error-message');
    const resultSection = document.getElementById('result-section');
    const resultOriginal = document.getElementById('result-original');
    const resultConverted = document.getElementById('result-converted');
    const downloadBtn = document.getElementById('download-btn');
    const resetBtn = document.getElementById('reset-btn');

    let selectedFile = null;
    let previewUrl = null;
    let pollTimer = null;

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.classList.add('visible');
    }

    function hideError() {
      errorMessage.classList.remove('visible');
      errorMessage.textContent = '';
    }

    function resetUI() {
      selectedFile = null;
      if (previewUrl) {
        URL.revokeObjectURL(previewUrl);
        previewUrl = null;
      }
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
      fileInput.value = '';
      uploadZone.style.display = '';
      previewSection.classList.remove('visible');
      spinnerSection.classList.remove('visible');
      resultSection.classList.remove('visible');
      convertBtn.disabled = false;
      hideError();
    }

    function validateFile(file) {
      if (!file) return 'No file selected.';
      if (!ALLOWED_TYPES.includes(file.type)) {
        return 'Invalid file type. Please upload a PNG, JPEG, or WebP image.';
      }
      if (file.size > MAX_FILE_SIZE) {
        return 'File is too large. Maximum size is 10 MB.';
      }
      return null;
    }

    function handleFile(file) {
      hideError();
      const err = validateFile(file);
      if (err) {
        showError(err);
        return;
      }
      selectedFile = file;
      if (previewUrl) URL.revokeObjectURL(previewUrl);
      previewUrl = URL.createObjectURL(file);
      previewThumb.src = previewUrl;
      previewFilename.textContent = file.name;
      previewSize.textContent = formatSize(file.size);
      previewSection.classList.add('visible');
    }

    // Drag and drop
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    // Click to browse
    uploadZone.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) handleFile(file);
    });

    // Convert
    convertBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      hideError();
      convertBtn.disabled = true;
      uploadZone.style.display = 'none';
      previewSection.classList.remove('visible');
      spinnerSection.classList.add('visible');

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);

        const res = await fetch('/api/convert', {
          method: 'POST',
          body: formData,
        });

        if (!res.ok) {
          const data = await res.json().catch(() => null);
          throw new Error(data?.error || `Upload failed (${res.status})`);
        }

        const { job_id } = await res.json();
        pollStatus(job_id);
      } catch (err) {
        spinnerSection.classList.remove('visible');
        uploadZone.style.display = '';
        previewSection.classList.add('visible');
        convertBtn.disabled = false;
        showError(err.message);
      }
    });

    function pollStatus(jobId) {
      pollTimer = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${jobId}`);
          if (!res.ok) {
            const data = await res.json().catch(() => null);
            throw new Error(data?.error || `Status check failed (${res.status})`);
          }

          const data = await res.json();

          if (data.status === 'done') {
            clearInterval(pollTimer);
            pollTimer = null;
            showResult(jobId);
          } else if (data.status === 'error') {
            clearInterval(pollTimer);
            pollTimer = null;
            throw new Error(data.error || 'Conversion failed.');
          }
        } catch (err) {
          clearInterval(pollTimer);
          pollTimer = null;
          spinnerSection.classList.remove('visible');
          uploadZone.style.display = '';
          previewSection.classList.add('visible');
          convertBtn.disabled = false;
          showError(err.message);
        }
      }, POLL_INTERVAL);
    }

    function showResult(jobId) {
      spinnerSection.classList.remove('visible');
      resultOriginal.src = previewUrl;
      resultConverted.src = `/api/download/${jobId}`;
      downloadBtn.href = `/api/download/${jobId}`;
      resultSection.classList.add('visible');
    }

    resetBtn.addEventListener('click', resetUI);
  </script>
</body>
</html>
